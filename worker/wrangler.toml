# wrangler.toml — Cloudflare Worker config for the BizWiz Assistant.
# Inference runs on Cloudflare Workers AI (Meta Llama 3.3 70B) via the AI
# binding below — there is no API key or secret to manage.
name = "bizwiz-assistant"
main = "src/index.js"
compatibility_date = "2025-05-01"

[ai]
binding = "AI"
